services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-portal_tcc}
      POSTGRES_USER: ${DB_USER:-portal_tcc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portal_tcc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portal_tcc} -d ${DB_NAME:-portal_tcc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_EXTERNAL_PORT:-8500}:8000"
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8080}:80"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  media_data:
