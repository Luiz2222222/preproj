services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-portal_tcc}
      POSTGRES_USER: ${DB_USER:-portal_tcc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portal_tcc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portal_tcc} -d ${DB_NAME:-portal_tcc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    expose:
      - "80"

volumes:
  postgres_data:
  media_data:
