<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal - TCC</title>
      <script>
      (function () {
        try {
          var tema = localStorage.getItem('tema') || 'dark';
          var tamanho = localStorage.getItem('tamanhoFonte') || 'medio';
          document.documentElement.setAttribute('data-tema', tema);
          document.documentElement.setAttribute('data-tamanho-fonte', tamanho);
        } catch (erro) {
          document.documentElement.setAttribute('data-tema', 'dark');
          document.documentElement.setAttribute('data-tamanho-fonte', 'medio');
        }
      })();
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
